version: '3.8'

services:
  devicestress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devicestress-app
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - PORT=5000
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
      - ./app.py:/app/app.py
    restart: unless-stopped
    networks:
      - devicestress-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.devicestress.version=1.0"
      - "com.devicestress.description=Professional System Stress Testing Platform"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Reverse proxy with Nginx
  nginx:
    image: nginx:alpine
    container_name: devicestress-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - devicestress
    networks:
      - devicestress-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}

networks:
  devicestress-network:
    driver: bridge

volumes:
  devicestress-data:
    driver: local
